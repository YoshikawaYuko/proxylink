<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>加密数据生成器 (本地版)</title>
    <!-- 关键点：这里直接引用你下载好的本地文件，确保和 index.html 用的是同一个心脏 -->
    <script src="./crypto-js.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background: #f4f6f8; }
        .box { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; font-family: monospace; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #4a90e2; color: white; border: none; border-radius: 4px; font-size: 16px; margin-right: 10px; }
        button:hover { background: #357abd; }
        #test-result { margin-top: 10px; font-weight: bold; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>加密数据生成器</h1>
    
    <div class="box">
        <h3>1. 确认环境</h3>
        <p>检查加密库状态：<span id="lib-status">...</span></p>
    </div>

    <div class="box">
        <h3>2. 输入密码 & 数据</h3>
        <input type="text" id="password" placeholder="设置访问密码 (请记住它!)">
        <p>输入订阅数据 (JSON格式):</p>
        <textarea id="data" rows="6">
[
  { "title": "2024年3月 - V1.0", "url": "https://example.com/sub/123" },
  { "title": "2024年3月 - V2.0", "url": "https://example.com/sub/456" }
]</textarea>
        <br><br>
        <button onclick="encrypt()">生成加密字符串</button>
    </div>
    
    <div class="box">
        <h3>3. 结果 (复制这个到 index.html)</h3>
        <textarea id="result" rows="4" readonly onclick="this.select()"></textarea>
        
        <!-- 新增：自我验证功能 -->
        <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;">
            <h4>自我验证 (Self-Check)</h4>
            <p>点击下方按钮，尝试用上面的密码解密刚刚生成的字符串，确保数据没坏。</p>
            <button onclick="testDecrypt()" style="background: #666;">测试解密</button>
            <div id="test-result"></div>
        </div>
    </div>

    <script>
        // 检查库是否加载
        window.onload = function() {
            const status = document.getElementById('lib-status');
            if (typeof CryptoJS === 'undefined') {
                status.innerHTML = "❌ 未加载！请确认 crypto-js.min.js 在同级目录";
                status.className = "error";
            } else {
                status.innerHTML = "✅ 已加载本地库";
                status.className = "success";
            }
        };

        function encrypt() {
            const pwd = document.getElementById('password').value;
            const data = document.getElementById('data').value;
            if(!pwd) return alert("❌ 缺密码");
            
            try {
                // 加密
                const encrypted = CryptoJS.AES.encrypt(data, pwd).toString();
                document.getElementById('result').value = encrypted;
                
                document.getElementById('test-result').innerHTML = "✅ 生成成功！请点击测试解密按钮进行复核。";
                document.getElementById('test-result').className = "success";
            } catch(e) {
                alert("生成失败：" + e.message);
            }
        }

        function testDecrypt() {
            const pwd = document.getElementById('password').value;
            const encrypted = document.getElementById('result').value;
            const output = document.getElementById('test-result');

            if (!encrypted) return alert("请先生成字符串");

            try {
                const bytes = CryptoJS.AES.decrypt(encrypted, pwd);
                const originalText = bytes.toString(CryptoJS.enc.Utf8);

                if (originalText.startsWith("[")) {
                    output.innerHTML = "✅ 验证通过！解密成功，JSON格式正确。<br>现在可以放心把字符串复制过去了。";
                    output.className = "success";
                } else {
                    output.innerHTML = "❌ 解密出的内容不是JSON，可能密码不对或包含乱码。";
                    output.className = "error";
                }
            } catch (e) {
                output.innerHTML = "❌ 解密彻底失败: " + e.message;
                output.className = "error";
            }
        }
    </script>
</body>
</html>
